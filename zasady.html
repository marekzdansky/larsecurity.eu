<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF; --bg2: #F6F5F3; --bg3: #EDECEA;
      --accent: #BE1622; --accent2: #D41E2C;
      --text: #1C1917; --muted: #6B7280;
      --border: rgba(0,0,0,0.09);
      --nav-h: 68px;
      --nav-bg: rgba(255,255,255,0.88);
      --nav-bg-scrolled: rgba(255,255,255,0.97);
    }
    [data-theme="dark"] {
      --bg: #0F1117; --bg2: #161B27; --bg3: #1E2535;
      --text: #F0EEE9; --muted: #9CA3AF;
      --border: rgba(255,255,255,0.08);
      --nav-bg: rgba(15,17,23,0.88);
      --nav-bg-scrolled: rgba(15,17,23,0.97);
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    .container { max-width: 780px; margin: 0 auto; padding: 0 24px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h); background: var(--nav-bg);
      backdrop-filter: blur(14px); border-bottom: 1px solid var(--border);
      transition: background .3s;
    }
    nav.scrolled { background: var(--nav-bg-scrolled); }
    .nav-inner { height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { height: 36px; width: auto; display: block; }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 600; color: var(--muted);
      padding: 7px 14px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg2);
      transition: background .2s, color .2s;
    }
    .back-btn:hover { background: var(--bg3); color: var(--text); }
    .back-btn svg { width: 14px; height: 14px; }

    /* Lang switcher */
    .lang-switcher { position: relative; }
    .lang-current {
      display: flex; align-items: center; gap: 4px;
      font-size: .75rem; font-weight: 700; letter-spacing: .8px;
      color: var(--text); background: var(--bg2);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 10px; cursor: pointer; transition: background .2s;
    }
    .lang-current:hover { background: var(--bg3); }
    .lang-current svg { width: 10px; height: 10px; transition: transform .2s; flex-shrink: 0; }
    .lang-switcher.open .lang-current svg { transform: rotate(180deg); }
    .lang-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.12);
      overflow: hidden; min-width: 72px; z-index: 200;
    }
    .lang-switcher.open .lang-dropdown { display: block; }
    .lang-opt {
      display: flex; align-items: center; gap: 6px; width: 100%; padding: 9px 14px;
      font-size: .78rem; font-weight: 600; letter-spacing: .5px;
      color: var(--muted); background: none; border: none;
      cursor: pointer; text-align: left; transition: background .15s, color .15s;
    }
    .lang-opt:hover { background: var(--bg2); color: var(--text); }
    .lang-opt.active { color: var(--accent); }
    .flag-img { display: inline-block; vertical-align: middle; }

    /* Dark mode toggle */
    .theme-toggle {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .theme-toggle:hover { background: var(--bg3); }
    .theme-toggle svg { width: 16px; height: 16px; stroke: var(--text); }
    .icon-sun { display: none; }
    [data-theme="dark"] .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun { display: block; }

    /* ── PAGE ── */
    .page-main {
      padding-top: calc(var(--nav-h) + 60px);
      padding-bottom: 80px;
      min-height: 100vh;
    }
    .page-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted); margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .page-breadcrumb a { color: var(--accent); }
    .page-breadcrumb a:hover { text-decoration: underline; }
    .page-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--accent); margin-bottom: 12px;
    }
    .page-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -.5px; margin-bottom: 40px;
      padding-bottom: 32px; border-bottom: 1px solid var(--border);
    }
    .section-block { margin-bottom: 36px; }
    .section-block h2 {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .section-block p { font-size: .95rem; color: var(--muted); line-height: 1.75; margin-bottom: 12px; }
    .section-block ul { padding-left: 20px; margin-bottom: 12px; }
    .section-block li { font-size: .95rem; color: var(--muted); line-height: 1.75; margin-bottom: 6px; }
    .section-block strong { color: var(--text); font-weight: 600; }
    .info-box {
      background: var(--bg2); border-radius: 10px;
      padding: 20px 24px; margin-bottom: 36px;
      font-size: .9rem; color: var(--muted); line-height: 1.75;
    }
    .info-box strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 1rem; }

    /* Footer */
    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 32px 0; }
    .footer-inner {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-copy { font-size: .8rem; color: var(--muted); }
    .footer-back { font-size: .8rem; font-weight: 600; color: var(--accent); }
    .footer-back:hover { text-decoration: underline; }

    /* Cookie banner */
    .cookie-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      justify-content: space-between;
      box-shadow: 0 -4px 24px rgba(0,0,0,.08);
      transform: translateY(100%);
      transition: transform .35s ease;
    }
    .cookie-banner.show { transform: translateY(0); }
    .cookie-banner-text { font-size: .85rem; color: var(--muted); flex: 1; min-width: 200px; }
    .cookie-banner-text a { color: var(--accent); font-weight: 600; }
    .cookie-banner-text a:hover { text-decoration: underline; }
    .cookie-banner-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .cookie-accept {
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; padding: 9px 20px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .2s;
    }
    .cookie-accept:hover { background: var(--accent2); }
    .cookie-reject {
      background: var(--bg2); color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px; padding: 9px 20px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .2s, color .2s;
    }
    .cookie-reject:hover { background: var(--bg3); color: var(--text); }

    @media (max-width: 600px) {
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .cookie-banner { padding: 14px 16px; }
      .cookie-banner-actions { width: 100%; }
      .cookie-accept, .cookie-reject { flex: 1; text-align: center; }
    }
  </style>
</head>

<script>
  /* ── Dark mode ── */
  const root = document.documentElement;
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    root.setAttribute('data-theme', 'dark');
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  });

  /* ── Sticky nav ── */
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  /* ── Lang switcher ── */
  const langSwitcher = document.getElementById('langSwitcher');
  document.getElementById('langToggle').addEventListener('click', e => {
    e.stopPropagation();
    langSwitcher.classList.toggle('open');
  });
  document.addEventListener('click', () => langSwitcher.classList.remove('open'));

      s1h: 'Персональні дані',
      s1: `Обробляю лише дані, які Ви самі надаєте — насамперед ім'я та електронну адресу при надсиланні контактної форми. Ці дані використовуються <strong>виключно для відповіді на Ваш запит</strong> і не передаються третім особам.<br><br>

      s3h: 'Файли cookie',
      s3: `Аналітичні файли cookie (Google Analytics) використовуються <strong>лише за Вашою згодою</strong>. Вони служать для вимірювання відвідуваності та покращення вмісту сайту. Технічні cookie необхідні для правильного функціонування сайту і не потребують згоди.<br><br>

      cookieMsg: 'Цей сайт використовує аналітичні файли cookie (Google Analytics) для вимірювання відвідуваності.',

  const flagCode = { cz: 'cz', pl: 'pl', de: 'de', en: 'gb', ua: 'ua' };
  let currentLang = localStorage.getItem('lang') || 'cz';

  function setLang(lang) {
    if (!content[lang]) return;
    currentLang = lang;
    localStorage.setItem('lang', lang);
    const t = content[lang];
    document.documentElement.lang = t.htmlLang;
    document.title = t.title;
    const fc = flagCode[lang] || lang;
    document.getElementById('langLabel').innerHTML = `<img src="https://flagcdn.com/20x15/${fc}.png" alt="${lang.toUpperCase()}" class="flag-img">`;
    document.querySelectorAll('.lang-opt').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    document.getElementById('backBtnLabel').textContent = t.back;
    document.getElementById('footerBack').textContent = '← ' + t.back;
    renderContent(t);
    updateCookieBanner(t);
  }

  function renderContent(t) {
    document.getElementById('privacyContainer').innerHTML = `
      <div class="page-breadcrumb">
        <a href="index.html">LarSecurity.cz</a>
        <span>›</span>
        <span>${t.heading}</span>
      </div>
      <div class="page-label">${t.label}</div>
      <h1 class="page-title">${t.heading}</h1>
      <div class="info-box">
        <strong>${t.controller}</strong>
        ${t.controllerBody}
      </div>
      <div class="section-block">
        <h2>${t.s1h}</h2>
        <p>${t.s1}</p>
      </div>
      <div class="section-block">
        <h2>${t.s2h}</h2>
        <ul>${t.s2.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
      <div class="section-block">
        <h2>${t.s3h}</h2>
        <p>${t.s3}</p>
      </div>
    `;
  }

  function updateCookieBanner(t) {
    document.getElementById('cookieMsg').textContent = t.cookieMsg;
    document.getElementById('cookieLink').textContent = t.cookieLink;
    document.getElementById('cookieAccept').textContent = t.cookieAccept;
    document.getElementById('cookieReject').textContent = t.cookieReject;
  }

  setLang(currentLang);

  /* ── Cookie consent ── */
  (function() {
    const banner = document.getElementById('cookieBanner');
    if (!localStorage.getItem('cookieConsent')) {
      setTimeout(() => banner.classList.add('show'), 600);
    }
    document.getElementById('cookieAccept').addEventListener('click', () => {
      localStorage.setItem('cookieConsent', 'accepted');
      banner.classList.remove('show');
    });
    document.getElementById('cookieReject').addEventListener('click', () => {
      localStorage.setItem('cookieConsent', 'rejected');
      banner.classList.remove('show');
    });
  })();
</script>
</body>
</html>
