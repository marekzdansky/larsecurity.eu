<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LarSecurity.cz</title>
  <link rel="icon" type="image/png" href="images/favicon-larsecurity.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF; --bg2: #F6F5F3; --bg3: #EDECEA;
      --accent: #BE1622; --accent2: #D41E2C;
      --text: #1C1917; --muted: #6B7280;
      --border: rgba(0,0,0,0.09);
      --nav-h: 68px;
      --nav-bg: rgba(255,255,255,0.88);
      --nav-bg-scrolled: rgba(255,255,255,0.97);
    }
    [data-theme="dark"] {
      --bg: #0F1117; --bg2: #161B27; --bg3: #1E2535;
      --text: #F0EEE9; --muted: #9CA3AF;
      --border: rgba(255,255,255,0.08);
      --nav-bg: rgba(15,17,23,0.88);
      --nav-bg-scrolled: rgba(15,17,23,0.97);
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    .container { max-width: 780px; margin: 0 auto; padding: 0 24px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h); background: var(--nav-bg);
      backdrop-filter: blur(14px); border-bottom: 1px solid var(--border);
      transition: background .3s;
    }
    nav.scrolled { background: var(--nav-bg-scrolled); }
    .nav-inner { height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { height: 36px; width: auto; display: block; }
    .nav-logo-badge {
      font-size: .65rem; font-weight: 500; color: var(--muted);
      border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px;
      letter-spacing: .8px; text-transform: uppercase;
    }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 600; color: var(--muted);
      padding: 7px 14px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg2);
      transition: background .2s, color .2s;
    }
    .back-btn:hover { background: var(--bg3); color: var(--text); }
    .back-btn svg { width: 14px; height: 14px; }

    /* Lang switcher */
    .lang-switcher { position: relative; }
    .lang-current {
      display: flex; align-items: center; gap: 4px;
      font-size: .75rem; font-weight: 700; letter-spacing: .8px;
      color: var(--text); background: var(--bg2);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 10px; cursor: pointer; transition: background .2s;
    }
    .lang-current:hover { background: var(--bg3); }
    .lang-current svg { width: 10px; height: 10px; transition: transform .2s; flex-shrink: 0; }
    .lang-switcher.open .lang-current svg { transform: rotate(180deg); }
    .lang-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.12);
      overflow: hidden; min-width: 64px; z-index: 200;
    }
    .lang-switcher.open .lang-dropdown { display: block; }
    .lang-opt {
      display: block; width: 100%; padding: 9px 14px;
      font-size: .78rem; font-weight: 600; letter-spacing: .5px;
      color: var(--muted); background: none; border: none;
      cursor: pointer; text-align: left; transition: background .15s, color .15s;
    }
    .lang-opt:hover { background: var(--bg2); color: var(--text); }
    .lang-opt.active { color: var(--accent); }
    .flag-img { display: inline-block; vertical-align: middle; }

    /* Dark mode toggle */
    .theme-toggle {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .theme-toggle:hover { background: var(--bg3); }
    .theme-toggle svg { width: 16px; height: 16px; stroke: var(--text); }
    .icon-sun { display: none; }
    [data-theme="dark"] .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun { display: block; }

    /* ── ARTICLE ── */
    .article-main {
      padding-top: calc(var(--nav-h) + 60px);
      padding-bottom: 80px;
      min-height: 100vh;
    }
    .article-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted); margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .article-breadcrumb a { color: var(--accent); }
    .article-breadcrumb a:hover { text-decoration: underline; }
    .article-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .article-kat {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--accent);
      background: rgba(190,22,34,.08); border-radius: 4px; padding: 3px 10px;
    }
    .article-date { font-size: .8rem; color: var(--muted); }
    .article-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700; line-height: 1.2;
      letter-spacing: -.5px; margin-bottom: 20px;
    }
    .article-lead {
      font-size: 1.1rem; color: var(--muted); line-height: 1.7;
      margin-bottom: 48px; padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    /* Article body styles (used by injected HTML from data files) */
    .article-body h2 {
      font-size: 1.2rem; font-weight: 700;
      margin-top: 36px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .article-body p { margin-bottom: 16px; line-height: 1.75; }
    .article-body ul, .article-body ol { margin: 0 0 16px 0; padding-left: 24px; }
    .article-body li { margin-bottom: 8px; line-height: 1.7; }
    .article-body strong { font-weight: 600; }
    .article-body .highlight-box {
      background: var(--bg2); border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0; padding: 16px 20px;
      margin: 24px 0; font-size: .95rem;
    }
    .article-body .hl-link { color: var(--accent); font-weight: 600; }
    .article-body .hl-link:hover { text-decoration: underline; }
    .mistake-num {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff;
      border-radius: 50%; width: 28px; height: 28px;
      font-size: .85rem; font-weight: 700; flex-shrink: 0;
    }

    /* External source button */
    .source-section {
      margin-top: 48px; padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .source-section p { font-size: .9rem; color: var(--muted); margin-bottom: 16px; }
    .source-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-size: .9rem; font-weight: 600;
      transition: background .2s, transform .15s;
    }
    .source-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .source-btn svg { width: 16px; height: 16px; }

    /* Error / loading state */
    .article-error {
      text-align: center; padding: 80px 24px; color: var(--muted);
    }
    .article-error h2 { font-size: 1.4rem; margin-bottom: 12px; color: var(--text); }
    .article-error a { color: var(--accent); font-weight: 600; }

    /* Footer */
    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 32px 0; }
    .footer-inner {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-copy { font-size: .8rem; color: var(--muted); }
    .footer-back { font-size: .8rem; font-weight: 600; color: var(--accent); }
    .footer-back:hover { text-decoration: underline; }

    /* Cookie banner */
    .cookie-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      justify-content: space-between;
      box-shadow: 0 -4px 24px rgba(0,0,0,.08);
      transform: translateY(100%); transition: transform .35s ease;
    }
    .cookie-banner.show { transform: translateY(0); }
    .cookie-banner-text { font-size: .85rem; color: var(--muted); flex: 1; min-width: 200px; }
    .cookie-banner-text a { color: var(--accent); font-weight: 600; }
    .cookie-banner-text a:hover { text-decoration: underline; }
    .cookie-banner-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .cookie-accept {
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 9px 20px; font-size: .85rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .2s;
    }
    .cookie-accept:hover { background: #D41E2C; }
    .cookie-reject {
      background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 20px; font-size: .85rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .2s, color .2s;
    }
    .cookie-reject:hover { background: var(--bg3); color: var(--text); }
    @media (max-width: 600px) {
      .nav-logo-badge { display: none; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .cookie-banner { padding: 14px 16px; }
      .cookie-banner-actions { width: 100%; }
      .cookie-accept, .cookie-reject { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

<nav id="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo" aria-label="LarSecurity.cz">
      <img src="images/larsecurity-logo.png" alt="LarSecurity.cz" />
      <span class="nav-logo-badge">BOZP · PO</span>
    </a>
    <div class="nav-actions">
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-current" id="langToggle" aria-label="Vybrat jazyk">
          <span id="langLabel">CZ</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-opt active" data-lang="cz"><img src="https://flagcdn.com/20x15/cz.png" alt="" class="flag-img"> CZ</button>
          <button class="lang-opt" data-lang="pl"><img src="https://flagcdn.com/20x15/pl.png" alt="" class="flag-img"> PL</button>
          <button class="lang-opt" data-lang="de"><img src="https://flagcdn.com/20x15/de.png" alt="" class="flag-img"> DE</button>
          <button class="lang-opt" data-lang="en"><img src="https://flagcdn.com/20x15/gb.png" alt="" class="flag-img"> EN</button>
          <button class="lang-opt" data-lang="ua"><img src="https://flagcdn.com/20x15/ua.png" alt="" class="flag-img"> UA</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Přepnout tmavý režim">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a href="index.html#aktuality" class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span id="backBtnLabel">Zpět na aktuality</span>
      </a>
    </div>
  </div>
</nav>

<main class="article-main">
  <div class="container" id="articleContainer">
    <!-- content rendered by JS -->
  </div>
</main>

<footer>
  <div class="container footer-inner">
    <span class="footer-copy">© 2025 LarSecurity.cz</span>
    <a href="index.html#aktuality" class="footer-back" id="footerBack">← Zpět na aktuality</a>
  </div>
</footer>

<script>
  /* ── Dark mode (apply before render to avoid flash) ── */
  const root = document.documentElement;
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    root.setAttribute('data-theme', 'dark');
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  });

  /* ── Sticky nav ── */
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  /* ── Lang switcher ── */
  const langSwitcher = document.getElementById('langSwitcher');
  document.getElementById('langToggle').addEventListener('click', e => {
    e.stopPropagation();
    langSwitcher.classList.toggle('open');
  });
  document.addEventListener('click', () => langSwitcher.classList.remove('open'));
  document.querySelectorAll('.lang-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      setLang(btn.dataset.lang);
      langSwitcher.classList.remove('open');
    });
  });

  /* ── UI labels per language ── */
  const ui = {
    cz: { back: 'Zpět na aktuality', footerBack: '← Zpět na aktuality', srcLabel: 'Zdroj článku', notFound: 'Článek nenalezen', notFoundSub: 'Vraťte se na', notFoundLink: 'přehled aktualit' },
    en: { back: 'Back to News',      footerBack: '← Back to News',      srcLabel: 'Article source', notFound: 'Article not found', notFoundSub: 'Return to', notFoundLink: 'news overview' },
    de: { back: 'Zurück zu Aktuelles', footerBack: '← Zurück zu Aktuelles', srcLabel: 'Artikelquelle', notFound: 'Artikel nicht gefunden', notFoundSub: 'Zurück zur', notFoundLink: 'Übersicht' },
    pl: { back: 'Powrót do aktualności', footerBack: '← Powrót do aktualności', srcLabel: 'Źródło artykułu', notFound: 'Artykuł nie znaleziony', notFoundSub: 'Wróć do', notFoundLink: 'przeglądu aktualności' },
    ua: { back: 'Назад до новин', footerBack: '← Назад до новин', srcLabel: 'Джерело статті', notFound: 'Статтю не знайдено', notFoundSub: 'Повернутися до', notFoundLink: 'огляду новин' },
  };

  let currentLang = localStorage.getItem('lang') || 'cz';
  let articleData = null;

  const _flagCode = { cz: 'cz', pl: 'pl', de: 'de', en: 'gb', ua: 'ua' };

  function setLang(lang) {
    if (!ui[lang]) return;
    currentLang = lang;
    localStorage.setItem('lang', lang);
    const fc = _flagCode[lang] || lang;
    document.getElementById('langLabel').innerHTML = `<img src="https://flagcdn.com/20x15/${fc}.png" alt="${lang.toUpperCase()}" class="flag-img">`;
    document.querySelectorAll('.lang-opt').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    if (articleData) renderArticle(articleData, lang);
  }

  function renderArticle(data, lang) {
    const t = data[lang] || data['cz'];
    const u = ui[lang] || ui['cz'];
    const container = document.getElementById('articleContainer');

    document.documentElement.lang = lang === 'cz' ? 'cs' : lang;
    document.title = `${t.title} — LarSecurity.cz`;
    document.getElementById('backBtnLabel').textContent = u.back;
    document.getElementById('footerBack').textContent = u.footerBack;

    let externalSection = '';
    if (data.externalUrl) {
      const label = t.externalLabel || u.srcLabel;
      externalSection = `
        <div class="source-section">
          <p>${u.srcLabel}:</p>
          <a href="${data.externalUrl}" target="_blank" rel="noopener" class="source-btn">
            ${label}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </a>
        </div>
      `;
    }

    container.innerHTML = `
      <div class="article-breadcrumb">
        <a href="index.html">LarSecurity.cz</a>
        <span>›</span>
        <a href="index.html#aktuality">${u.back.replace('← ', '').replace('Powrót do ', '').replace('Zurück zu ', '')}</a>
        <span>›</span>
        <span>${t.title}</span>
      </div>
      <div class="article-meta">
        <span class="article-kat">${t.kat}</span>
        <span class="article-date">${t.date}</span>
      </div>
      <h1 class="article-title">${t.title}</h1>
      <p class="article-lead">${t.perex}</p>
      <div class="article-body">${t.body}</div>
      ${externalSection}
    `;
  }

  function showError() {
    const u = ui[currentLang] || ui['cz'];
    document.getElementById('articleContainer').innerHTML = `
      <div class="article-error">
        <h2>${u.notFound}</h2>
        <p>${u.notFoundSub} <a href="index.html#aktuality">${u.notFoundLink}</a>.</p>
      </div>
    `;
  }

  /* ── Load article data from aktuality/ folder ── */
  const params = new URLSearchParams(window.location.search);
  const articleId = parseInt(params.get('id'), 10);

  if (!articleId || articleId < 1 || articleId > 99) {
    showError();
  } else {
    const script = document.createElement('script');
    script.src = `aktuality/aktualita-${articleId}.js`;
    script.onload = () => {
      articleData = (window.aktualityData || {})[articleId];
      if (!articleData) { showError(); return; }
      // Apply lang switcher listeners to render on change
      document.querySelectorAll('.lang-opt').forEach(btn => {
        btn.addEventListener('click', () => renderArticle(articleData, currentLang));
      });
      setLang(currentLang);
    };
    script.onerror = showError;
    document.head.appendChild(script);
  }

  /* ── Cookie consent ── */
  const _cookieTexts = {
    cz: { msg:'Tento web používá analytické cookies (Google Analytics) pro měření návštěvnosti.', link:' Zásady cookies', accept:'Přijmout vše', reject:'Odmítnout' },
    en: { msg:'This website uses analytical cookies (Google Analytics) to track traffic.', link:' Cookie Policy', accept:'Accept All', reject:'Decline' },
    de: { msg:'Diese Website verwendet Analyse-Cookies (Google Analytics) zur Messung der Besucherzahlen.', link:' Cookie-Richtlinie', accept:'Alle akzeptieren', reject:'Ablehnen' },
    pl: { msg:'Ta strona używa analitycznych plików cookie (Google Analytics) do pomiaru ruchu.', link:' Polityka cookies', accept:'Akceptuj wszystkie', reject:'Odrzuć' },
    ua: { msg:'Цей сайт використовує аналітичні файли cookie (Google Analytics) для вимірювання відвідуваності.', link:' Політика cookies', accept:'Прийняти все', reject:'Відхилити' },
  };
  function _updateCookieLang(lang) {
    const t = _cookieTexts[lang] || _cookieTexts.cz;
    document.getElementById('cookieMsg').textContent = t.msg;
    document.getElementById('cookieLink').textContent = t.link;
    document.getElementById('cookieAccept').textContent = t.accept;
    document.getElementById('cookieReject').textContent = t.reject;
  }
  (function() {
    const banner = document.getElementById('cookieBanner');
    if (!banner) return;
    _updateCookieLang(currentLang);
    if (!localStorage.getItem('cookieConsent')) {
      setTimeout(() => banner.classList.add('show'), 800);
    }
    document.getElementById('cookieAccept').addEventListener('click', () => {
      localStorage.setItem('cookieConsent', 'accepted');
      banner.classList.remove('show');
    });
    document.getElementById('cookieReject').addEventListener('click', () => {
      localStorage.setItem('cookieConsent', 'rejected');
      banner.classList.remove('show');
    });
  })();
</script>

<!-- ══ COOKIE BANNER ══ -->
<div class="cookie-banner" id="cookieBanner" role="dialog" aria-label="Cookie souhlas">
  <p class="cookie-banner-text">
    <span id="cookieMsg">Tento web používá analytické cookies (Google Analytics) pro měření návštěvnosti.</span>
    <a href="zasady.html" id="cookieLink"> Zásady cookies</a>
  </p>
  <div class="cookie-banner-actions">
    <button class="cookie-reject" id="cookieReject">Odmítnout</button>
    <button class="cookie-accept" id="cookieAccept">Přijmout vše</button>
  </div>
</div>
</body>
</html>
